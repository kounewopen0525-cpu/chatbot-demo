<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FAQ自動e��答デモ｜ビジネススクール</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center}

.header{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px 24px;text-align:center}

.header h1{font-size:1.2rem;font-weight:600}

.header p{font-size:.8rem;opacity:.85;margin-top:4px}

.chat-container{width:100%;max-width:480px;flex:1;display:flex;flex-direction:column;background:#fff;margin:0 auto;box-shadow:0 2px 20px rgba(0,0,0,.08)}

.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

.msg{max-width:82%;padding:12px 16px;border-radius:18px;font-size:.9rem;line-height:1.6;animation:fadeIn .3s ease}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.bot{background:#f0f2f5;color:#1a1a2e;align-self:flex-start;border-bottom-left-radius:4px}

.user{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}

.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px}

.quick-btn{background:#fff;border:1.5px solid #667eea;color:#667eea;padding:8px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .2s}

.quick-btn:hover{background:#667eea;color:#fff}

.input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #e8e8e8;background:#fff}

.input-area input{flex:1;border:1.5px solid #ddd;border-radius:24px;padding:10px 16px;font-size:.9rem;outline:none;transition:border .2s}

.input-area input:focus{border-color:#667eea}

.input-area button{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:1.1rem;transition:transform .2s}

.input-area button:hover{transform:scale(1.05)}

.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}

.typing span{width:8px;height:8px;background:#aaa;border-radius:50%;animation:bounce .6s infinite alternate}

.typing span:nth-child(2){animation-delay:.2s}

.typing span:nth-child(3){animation-delay:.4s}

@keyframes bounce{to{transform:translateY(-6px);opacity:.4}}

.badge{display:inline-block;background:rgba(102,126,234,.12);color:#667eea;font-size:.7rem;padding:2px 8px;border-radius:10px;margin-bottom:4px}

</style>

</head>

<body>

<div class="header">

<h1>📚 ビジネススクール FAQ自動e��答</h1>

<p>76問のFAQに24時間自動対応 ─ デモ版</p>

</div>

<div class="chat-container">

<div class="messages" id="messages"></div>

<div class="quick-replies" id="quickReplies"></div>

<div class="input-area">

<input type="text" id="userInput" placeholder="質問を入力してください..." onkeypress="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()">➤</button>

</div>

</div>

<script>

const faq = [

  {q:["料金","費用","いくら","価格","値段"],a:"受講料金はコースにより異なります。\n\n・ベーシックコース：月額29,800円\n・スタンダードコース：月額49,800円\n・プレミアムコース：月額79,800円\n\n各コースの詳細は無料相談会でご説明しております。"},

  {q:["無料相談","相談会","カウンセリング","説明会"],a:"無料相談会は毎週火・木・土に開催しています！\n\n📅 所要時間：約30分（Zoom開催）\n📌 内容：学習プラン・キャリア相談\n\n▼ ご予約はこちら\n下のボタンから「無料相談を予約する」をタップしてください。",action:"booking"},

  {q:["期間","どのくらい","何ヶ月","何か月"],a:"標準的な学習期間の目安です。\n\n・ベーシック：3ヶ月\n・スタンダード：6ヶ月\n・プレミアム：12ヶ月\n\n個人のペースに合わせて柔軟に調整可能です。"},

  {q:["オンライン","通学","対面","リモート"],a:"すべてのコースがオンライン完結です！\n\n・ライブ授業＋録画視聴OK\n・チャットで質問し放題\n・月1回のメンター面談\n\nお好きな時間に学習できます。"},

  {q:["就職","転職","キャリア","仕事"],a:"充実の転職サポートをご用意しています。\n\n✅ 履歴書・職務経歴書の添削\n✅ 面接対策（模擬面接あり）\n✅ 求人紹介（提携企業300社以上）\n\n転職成功率は92%です。"},

  {q:["解約","退会","やめたい","キャンセル"],a:"解約はマイページからいつでも可能です。\n\n・次回更新日の7日前までに手続き\n・日割り返金あり\n・違約金なし\n\nご不明点はサポートまでお問い合わせください。"},

  {q:["支払い","クレジット","分割","振込"],a:"お支払い方法は以下に対応しています。\n\n💳 クレジットカード（VISA/Master/AMEX）\n🏦 銀行振込\n📱 分割払い（3/6/12回）\n\n分割手数料は当校負担です。"},

  {q:["初心者","未経験","ゼロから","始めて"],a:"もちろん初心者大歓迎です！\n\n受講生の78%が未経験からスタートしています。\n\n・基礎から丁寧にサポート\n・つまずきポイントは個別フォロー\n・同期の仲間と一緒に学べる\n\nまずは無料相談でご相談ください。"},

];



const quickButtons = [

  "料金について","無料相談を予約","学習期間は？","オンライン対応？","転職サポート","支払い方法"

];



function init(){

  addBotMessage("こんにちは！ビジネススクールのFAQ自動e��答ボットです 🎓\n\nご質問を入力いただくか、下のボタンからお選びください。");

  showQuickReplies(quickButtons);

}



function addBotMessage(text,delay=600){

  const msgs=document.getElementById('messages');

  const typing=document.createElement('div');

  typing.className='typing';

  typing.innerHTML='<span></span><span></span><span></span>';

  msgs.appendChild(typing);

  msgs.scrollTop=msgs.scrollHeight;

  setTimeout(()=>{

    typing.remove();

    const div=document.createElement('div');

    div.className='msg bot';

    div.innerHTML='<div class="badge">AI自動e��答</div><br>'+text.replace(/\n/g,'<br>');

    msgs.appendChild(div);

    msgs.scrollTop=msgs.scrollHeight;

  },delay);

}



function addUserMessage(text){

  const msgs=document.getElementById('messages');

  const div=document.createElement('div');

  div.className='msg user';

  div.textContent=text;

  msgs.appendChild(div);

  msgs.scrollTop=msgs.scrollHeight;

}



function showQuickReplies(buttons){

  const container=document.getElementById('quickReplies');

  container.innerHTML='';

  buttons.forEach(b=>{

    const btn=document.createElement('button');

    btn.className='quick-btn';

    btn.textContent=b;

    btn.onclick=()=>{sendQuick(b)};

    container.appendChild(btn);

  });

}



function sendQuick(text){

  document.getElementById('quickReplies').innerHTML='';

  addUserMessage(text);

  processInput(text);

}



function sendMessage(){

  const input=document.getElementById('userInput');

  const text=input.value.trim();

  if(!text)return;

  input.value='';

  document.getElementById('quickReplies').innerHTML='';

  addUserMessage(text);

  processInput(text);

}



function processInput(text){

  const match=faq.find(f=>f.q.some(k=>text.includes(k)));

  if(match){

    addBotMessage(match.a);

    if(match.action==='booking'){

      setTimeout(()=>showQuickReplies(["無料相談を予約する 📅"]),1200);

    } else {

      setTimeout(()=>showQuickReplies(["他の質問をする","無料相談を予約"]),1200);

    }

  } else {

    addBotMessage("申し訳ございません。該当するFAQが見つかりませんでした。\n\nより詳しいご案内は無料相談会でお伝えできます。\n下のボタンからご予約ください 👇");

    setTimeout(()=>showQuickReplies(["無料相談を予約する 📅","よくある質問を見る"]),1200);

  }

}



init();

</script>

</body>

</html>
